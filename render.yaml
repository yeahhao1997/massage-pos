# Render 蓝图 / Blueprint —— 免费试用一键部署
# 免费版限制：闲置休眠、无持久磁盘（数据会在重新部署时重置）
# 转正时把 plan 改为 starter 并加 disk（见 DEPLOY.md）
services:
  - type: web
    name: massage-pos
    runtime: docker
    region: singapore
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false        # 在 Render 后台手动填写你的管理员密码
